apiVersion: 1

datasources:
  - name: TeslaMate
    type: postgres
    uid: TeslaMate
    access: proxy
    url: ${DATABASE_HOST}:5432
    user: ${DATABASE_USER}
    basicAuth: false
    withCredentials: false
    isDefault: true
    secureJsonData:
      password: ${DATABASE_PASS}
    jsonData:
      database: ${DATABASE_NAME}
      sslmode: disable
      postgresVersion: 1500
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      timescaledb: false
    version: 1
    editable: false
